<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../public/ui.css">
</head>

<body>

  <div class="navbar">
    <h2>💸 Expense Tracker</h2>

    <div class="right-section">
      <span id="premiumBadge" class="badge hidden">👑 Premium</span>
      <button id="buyPremiumBtn" onclick="buyPremium()">Upgrade</button>
    </div>
  </div>

  <div class="container">

    <div class="card">
      <h3>Add Expense</h3>

      <input type="number" id="amount" placeholder="Amount">
      <input type="text" id="description" placeholder="Description">

      <button onclick="addTransaction()">Add Expense</button>
    </div>

    <div class="card">
      <h3>Your Expenses</h3>
      <ul id="totalexpense"></ul>
      <ul id="expenseList"></ul>
    </div>

  </div>
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
  <script src="../public/ui.js"></script>
</body>
</html>
