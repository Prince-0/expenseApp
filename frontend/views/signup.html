<!DOCTYPE html> 
<html> 
    <head> 
        <meta charset='utf-8'> <meta http-equiv='X-UA-Compatible' content='IE=edge'> 
        <title>SignUp</title> <meta name='viewport' content='width=device-width, initial-scale=1'> 
    </head> 
        <body> 
            <form onsubmit="signup(event)" method="POST">
                <h1>Sign up please</h1> 
                <label for="email" name="email">Enter email:</label> 
                <input type="email" name="email" id="email" autocomplete="email" required><br> 
                <label for="password" name="password">Enter password:</label> 
                <input type="password" name="password" id="password" autocomplete="current-password"required><br> 
                <button>Signup</button> 

                <p style="margin-top: 10px;">
                    Already have an account? 
                    <a href="login.html">Login here</a>
                </p>
            </form> 
                <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> 
                <script src="../public/signup.js"></script> 
        </body> 
</html>
